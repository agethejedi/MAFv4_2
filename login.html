
<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAF — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head><body>
  <div class="nav"><div class="brand">
    <img class="logo" src="assets/logo.svg" alt="MAF"><div class="title">MAF — Login</div>
  </div><div class="row"><a class="pill" href="index.html">Home</a></div></div>

  <div class="container grid cols-2">
    <div class="card"><h2>Sign in</h2>
      <div class="label">Email</div><input class="input" id="email" placeholder="you@example.com"/>
      <div class="label">Password <span class="small">(auto-create if new)</span></div><input class="input" id="pwd" type="password" value="password123"/>
      <div class="row" style="margin-top:10px">
        <button id="signin" class="btn primary">Sign In</button><button id="signout" class="btn ghost">Sign Out</button>
      </div><div class="footer-note">Uses Firebase Auth if configured, otherwise local demo sign-in.</div>
    </div>
    <div class="card"><h2>Status</h2><div id="status">Not signed in</div></div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module">
    import { el, toast } from "./js/utils.js";
    import { isFirebaseConfigured } from "./js/firebase-init.js";
    import { initFirebase, signInEmail, signOut, onAuth } from "./js/firebase-live.js";
    import { MockAuth } from "./js/mockFirebase.js";
    const useFirebase = isFirebaseConfigured();
    if(useFirebase){
      initFirebase().then(()=> toast("Firebase connected"));
      onAuth((user)=>{
        if(user){ localStorage.setItem("maf_current_user", JSON.stringify({uid:user.uid,email:user.email||"user"}));
          el("#status").textContent = "Signed in as " + (user.email || user.uid);
        }else{ el("#status").textContent = "Not signed in"; }
      });
      el("#signin").addEventListener("click", async ()=>{
        const email = el("#email").value.trim() || "guest@example.com";
        const pwd = el("#pwd").value || "password123";
        try{ await signInEmail(email, pwd); toast("Signed in"); }catch(e){ toast("Sign-in failed"); console.error(e); }
      });
      el("#signout").addEventListener("click", async ()=>{ await signOut(); toast("Signed out"); localStorage.removeItem("maf_current_user"); });
    }else{
      const u = MockAuth.load();
      if(u){ toast("Signed in (local): " + u.email); el("#status").textContent = "Signed in (local) as " + u.email; }
      el("#signin").addEventListener("click", ()=>{
        const email = el("#email").value.trim() || "guest@local";
        const user = MockAuth.signIn(email);
        toast("Signed in (local)"); el("#status").textContent = "Signed in (local) as " + user.email;
      });
      el("#signout").addEventListener("click", ()=>{ MockAuth.signOut(); toast("Signed out"); el("#status").textContent="Not signed in"; });
    }
  </script>
</body></html>
