
<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAF — Workbook (v4.2)</title>
  <link rel="stylesheet" href="css/styles.css">
</head><body>
  <div class="nav"><div class="brand">
    <img id="avatarImg" class="logo" src="assets/avatars/a1.svg" alt="Avatar">
    <div class="title">MAF — Workbook</div>
  </div><div class="row">
    <span class="badge">Grade: <span id="grade">1</span></span>
    <span class="badge">Difficulty: <span id="difficulty">easy</span></span>
    <span class="badge">Types: <span id="ptype">add, sub</span></span>
    <span class="badge">Total: <span id="total">10</span></span>
    <a class="pill" href="index.html">Home</a>
  </div></div>

  <div class="container grid cols-2" id="session">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div class="badge">Problem <span id="qno">1/10</span></div>
        <div class="badge">Avg Time: <span id="avgTime" class="timer">0.00s</span></div>
      </div>
      <div style="margin-top:16px" id="problemArea"><div class="problem">4 + 5</div></div>
      <div class="row" style="margin-top:10px">
        <input class="input" id="answer" placeholder="Your answer (e.g., 7:05 or 12)"/>
        <button id="submit" class="btn primary">Check</button>
      </div>
      <div class="row" style="margin-top:12px; gap:18px">
        <div><div class="small">Correct</div><div id="correct" class="kpi">0</div></div>
        <div><div class="small">Streak</div><div id="streak" class="kpi">0</div></div>
      </div>
    </div>
    <div class="card"><h3>Performance</h3>
      <div class="small">Stats update after each problem; rank at the end.</div>
      <hr/><div class="small">Tip: For time, use <strong>H:MM</strong> (e.g., 7:05).</div>
    </div>
  </div>

  <div class="container" id="summary" style="display:none">
    <div class="card"><h2>Great work!</h2>
      <div class="grid cols-3">
        <div><div class="small">Accuracy</div><div id="sumAccuracy" class="kpi">—</div></div>
        <div><div class="small">Avg Time / Q</div><div id="sumAvg" class="kpi">—</div></div>
        <div><div class="small">Rank</div><div id="sumRank" class="kpi">—</div></div>
      </div>
      <hr/><div class="row">
        <button id="restart" class="btn">Run Another</button>
        <button id="backHome" class="btn ghost">Back Home</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/workbook.js"></script>
</body></html>
